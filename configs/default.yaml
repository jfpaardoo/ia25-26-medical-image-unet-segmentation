project:
  name: medical-image-unet-segmentation
  seed: 394867

data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  image_size: [256, 256]
  patch_size: [256, 256]
  patch_stride: [128, 128]
  mask_format: binary
  use_official_drive_split: true
  augmentation:
    enabled: true
    transforms: [hflip, vflip, rot90, noise, contrast]
  split:
    train: 0.7
    val: 0.3
    test: 0.0

training:
  batch_size: 4
  epochs: 100
  learning_rate: 0.001
  loss: dice
  validation_split: 0.3
  num_workers: 0

model:
  kernel_size: 4
  input_channels: 1
  output_channels: 1
  base_filters: 32
  depth: 3
  use_batch_norm: true
  dropout_rate: 0.1

outputs:
  checkpoints_dir: models/checkpoints
  final_model_dir: models/final
  figures_dir: artifacts/figures
  logs_dir: artifacts/logs
  predictions_dir: artifacts/predictions