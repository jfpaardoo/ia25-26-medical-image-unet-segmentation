project:
  name: medical-image-unet-segmentation
  seed: 394867

data:
  raw_dir: data/raw
  image_size: [584, 565]
  patch_size: [128, 128]
  patch_stride: [128, 128]
  mask_format: binary
  augmentation:
    enabled: true
    transforms: [hflip, vflip, rot90]

training:
  batch_size: 16
  epochs: 75
  learning_rate: 0.001
  loss: bce_dice
  num_workers: 0

model:
  input_channels: 1
  output_channels: 1
  base_filters: 16
  depth: 4
  use_batch_norm: true
  dropout_rate: 0.25

outputs:
  checkpoints_dir: models/checkpoints
  final_model_dir: models/final
  figures_dir: artifacts/figures
  logs_dir: artifacts/logs
  predictions_dir: artifacts/predictions