project:
  name: medical-image-unet-segmentation
  seed: 394867

data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  image_size: [584, 565]
  patch_size: [128, 128]
  patch_stride: [128, 128]
  mask_format: binary
  use_official_drive_split: true
  augmentation:
    enabled: true
    transforms: [hflip, vflip, rot90]
  split:
    train: 0.8
    val: 0.2
    test: 0.0

training:
  batch_size: 16
  epochs: 75
  learning_rate: 0.001
  loss: bce_dice
  validation_split: 0.2
  num_workers: 0

model:
  input_channels: 1
  output_channels: 1
  base_filters: 16
  depth: 4
  use_batch_norm: true
  dropout_rate: 0.25

outputs:
  checkpoints_dir: models/checkpoints
  final_model_dir: models/final
  figures_dir: artifacts/figures
  logs_dir: artifacts/logs
  predictions_dir: artifacts/predictions